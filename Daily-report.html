<head>

<title>Daily Report Dashboard</title>
<style>body{font-family:Arial,sans-serif;background:#f5f7fb;margin:0;padding:30px;color:#111827}.box{max-width:1100px;margin:auto;background:#fff;padding:30px;border-radius:20px}.top{display:flex;justify-content:space-between;align-items:center}.badge{background:#eafaf0;color:#10b981;padding:8px 14px;border-radius:30px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:25px}.card{background:#f8fafc;padding:20px;border-radius:16px}.back{display:inline-block;margin-top:20px;text-decoration:none}</style>
